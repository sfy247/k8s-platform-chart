{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "generic-app.fullname" . }}
  labels:
    {{- include "generic-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "generic-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicy.ingressSelectors }}
    {{- toYaml .Values.networkPolicy.ingressSelectors | nindent 4 }}
    {{- else }}
    - {}
    {{- end }}
{{- end }}
