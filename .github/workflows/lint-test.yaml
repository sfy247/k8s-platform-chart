name: Lint and Test Charts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint charts/generic-app

      - name: Template chart with default values
        run: helm template test-release charts/generic-app

      - name: Template chart with nodejs example
        run: |
          helm template test-nodejs charts/generic-app \
            -f examples/nodejs-app.yaml \
            -f environments/prod.yaml

      - name: Template chart with python example
        run: |
          helm template test-python charts/generic-app \
            -f examples/python-app.yaml \
            -f environments/dev.yaml

      - name: Template chart with sidecar example
        run: helm template test-sidecar charts/generic-app -f examples/sidecar-app.yaml

      - name: Validate all templates render without error
        run: |
          helm template test-full charts/generic-app \
            --set image.repository=ghcr.io/sfy247/test-app \
            --set image.tag=latest \
            --set ingress.enabled=true \
            --set ingress.host=test.example.com \
            --set autoscaling.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set persistence.enabled=true \
            --set networkPolicy.enabled=true \
            --set configMap.enabled=true
